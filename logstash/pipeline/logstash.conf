input {
  mongodb {
    uri => "mongodb://root:example@mongodb:27017/waze_alertas?authSource=admin"
    placeholder_db_dir => "/opt/logstash-mongodb/"
    placeholder_db_name => "logstash_sqlite.db"
    collection => "eventos"
    batch_size => 5000
  }
}

filter {
  # Convertir el timestamp a formato de fecha si existe
  if [timestamp] {
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }
  }
  
  # Parsear coordenadas de ubicación si existen
  if [location] {
    if [location][lat] and [location][lon] {
      mutate {
        add_field => { 
          "[geo_location][lat]" => "%{[location][lat]}"
          "[geo_location][lon]" => "%{[location][lon]}"
        }
      }
    }
  }
  
  # Normalizar el tipo de evento
  if [type] {
    mutate {
      uppercase => [ "type" ]
    }
  }
  
  # Agregar índice con timestamp para rotación diaria
  mutate {
    add_field => { "index_name" => "waze-events-%{+YYYY.MM.dd}" }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{index_name}"
    document_type => "_doc"
    document_id => "%{uuid}"
  }
  
  stdout { 
    codec => rubydebug 
  }
}
